  <div class="container">
    <h1>Shopping Cart</h1>

	@if (isLoading) {
		<div>LOADING...</div>
	}
    <div class="cart-grid">
      <div class="cart-items">

		@for(item of cartItems; track item.itemId) {

        <div class="item">
          <div class="item-image"><img [src]="item.imageUrl"/></div>
          <div class="item-details">
            <div class="item-name">{{item.name}}</div>
            <div class="item-price">${{item.unitPrice}}</div>
            <div class="item-quantity">
              <button class="quantity-btn" (click)="updateItem(item, item.quantity - 1)">-</button>
              <span class="quantity-display">{{item.quantity}}</span>
              <button class="quantity-btn" (click)="updateItem(item, item.quantity + 1)">+</button>
              <button class="remove-btn" (click)="updateItem(item, 0)">Remove</button>
            </div>
          </div>
        </div>

        }
      </div>

      <div class="cart-summary">
        <div class="summary-row">
          <span>Subtotal</span>
          <span>{{subtotal | currency}}</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>{{shipping | currency}}</span>
        </div>
        <div class="summary-row">
          <span>Tax</span>
          <span>{{tax | currency}}</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span>{{total | currency}}</span>
        </div>
        <button class="checkout-btn">Proceed to Checkout</button>
        <a href="#" class="continue-shopping">Continue Shopping</a>
      </div>
    </div>
  </div>

<router-outlet />
